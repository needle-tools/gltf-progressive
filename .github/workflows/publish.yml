name: Release Workflow
on:
  push:
    branches:
      - 'release/canary'
      - 'release/next'
      - 'release/rc'
      - 'release/stable'

jobs:
  run-release-script:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      id-token: write  # Required for OIDC authentication
      contents: write   # Required to checkout code
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # with:
        #   submodules: false
        #   token: ${{ secrets.GH_RELEASE_TOKEN }} 
      # - name: Initialize specific submodules
      #   run: |
      #     git config --global url."https://x-access-token:${{ secrets.GH_RELEASE_TOKEN }}@github.com/".insteadOf "https://github.com/"
      #     git submodule update --init modules/gltf-progressive
      #     git submodule update --init modules/needle-engine-modules
        # working-directory: ./
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # Node 24+ includes npm 11.5+ with OIDC support
          cache: 'npm'
          cache-dependency-path: './package.json'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run build script
        run: npm run build
                
      - name: Publish to npm (next and canary branches)
        if: startsWith(github.ref_name, 'release/next') || startsWith(github.ref_name, 'release/canary')
        run: npx --yes needle-publish-helper@next publish "./dist" --oidc --webhook "${{ secrets.DISCORD_WEBHOOK }}" --tag "${{ github.ref_name }}" --version+tag --version+hash --create-tag "release/" --llm-api-key "${{ secrets.LLM_API_KEY }}"

      - name: Publish to npm (rc branch)
        if: startsWith(github.ref_name, 'release/rc')
        run: npx --yes needle-publish-helper@next publish "./dist" --oidc --webhook "${{ secrets.DISCORD_WEBHOOK }}" --tag "rc" --create-tag "release/" --llm-api-key "${{ secrets.LLM_API_KEY }}"

      - name: Publish to npm (stable branch)
        if: startsWith(github.ref_name, 'release/stable')
        run: npx --yes needle-publish-helper@next publish "./dist" --oidc --webhook "${{ secrets.DISCORD_WEBHOOK }}" --tag "stable" --create-tag "release/" --llm-api-key "${{ secrets.LLM_API_KEY }}"
                


